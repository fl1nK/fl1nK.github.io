<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Філоненко В.П. ІТ-03</title>
        <style>
        #tr1 {
            background-color: #778f8f;
            color: black;
        }

        #tr1:hover {
            background-color: #eed8c6;
            color: black;
        }

        #tr2 {
            background-color: #f5f577;
            color: black;
        }
 
        #tr2:hover {
            background-color: #8754a4; 
            color: yellow;
        }
        </style>
        <link rel="stylesheet" href="style.css">
    </head>

<body>
    <div>
        <table border="1" style="width:100%;">
            <tr id="tr1">
                <td rowspan="2" colspan="2">Філоненко</td>
                <td>Владислав</td>
                <td>Павлович</td>
            </tr>
            <tr id="tr2">
                <td>ІТ-03</td>
                <td>ЛР-2 Варіант 7</td>
            </tr>
            <tr>
                <td colspan="2"></td>
                <td>&nbsp;</td>
                <td rowspan="2"></td>
            </tr>
            <tr>
                <td>&nbsp;</td>
                <td>&nbsp;</td>
                <td>&nbsp;</td>
            </tr>
        </table>
    </div>

    <div class="clock">
        <div class="point" id="position-point1"></div>   
        <div class="point" id="position-point2"></div>   
        <div class="point" id="position-point3"></div>   
        <div class="point" id="position-point4"></div>   
        <div class="arrow" id="position-arrowH"></div>   
        <div class="arrow" id="position-arrowM"></div>   
  
    </div>

    <div class="clock">
        <div class="point" id="transform-point1"></div>   
        <div class="point" id="transform-point2"></div>   
        <div class="point" id="transform-point3"></div>   
        <div class="point" id="transform-point4"></div>   
        <div class="arrow" id="transform-arrowH"></div>   
        <div class="arrow" id="transform-arrowM"></div>   
    </div>

</body>
</html>
